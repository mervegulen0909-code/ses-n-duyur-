name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version is read from the root package.json "packageManager" field — the
      # single source of truth. Pinning it here too makes action-setup@v4 fail
      # with ERR_PNPM_BAD_PM_VERSION ("Multiple versions of pnpm specified").
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Database migrations from zero
        run: |
          pnpm db:start
          pnpm db:reset
          pnpm exec supabase db lint --local --level warning

      - name: Test (with coverage)
        run: pnpm test:cov

      # Build was previously CI-uncovered: a broken `next build` (or any package
      # build) only surfaced on Vercel. `pnpm -r build` runs each workspace that
      # has a build script (web + scoring); env-less build degrades safely.
      - name: Build
        run: pnpm build

      - name: Expo Doctor
        run: pnpm exec expo-doctor apps/mobile

      - name: Mobile Android bundle
        run: pnpm --filter @voxscore/mobile exec expo export --platform android --output-dir /tmp/voxscore-mobile-export

      # E2E smoke (apps/web/e2e). Playwright's webServer does its own next build
      # + start, so this also guards the production server boot path.
      - name: Install Playwright browsers
        run: pnpm --filter @voxscore/web exec playwright install --with-deps chromium

      # The local Supabase stack from "Database migrations from zero" is still
      # running in this job. Export its URL/anon key so the web server gets a
      # real (empty-DB) client and signed-out flows behave like production —
      # e.g. /league must redirect to /login?next=/league instead of rendering
      # the env-less "Supabase not configured" fallback.
      - name: E2E (smoke)
        run: |
          eval "$(pnpm exec supabase status -o env | grep -E '^(API_URL|ANON_KEY)=')"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          pnpm test:e2e
